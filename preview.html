<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cazadores de sonidos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
    }

    h1 {
      margin-top: 20px;
    }

    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .item {
      cursor: pointer;
      transition: transform 0.2s;
    }

    .item:hover {
      transform: scale(1.05);
    }

    .item img {
      width: 100%;
      max-width: 180px;
      height: auto;
      border-radius: 15px;
      border: 3px solid #ccc;
    }
  </style>
</head>
<body>

<h1>Presioná una imagen y sonara el sonido correspondiente 🔊</h1>
<h2>Imagenes de la primer carilla</h2>

<div class="galeria">
  <div class="item" onclick="reproducirAudio('LlaveAudio')">
    <img src="img\Carilla 1\Llave.PNG" alt="LlaveAudio">
    <audio id="LlaveAudio" src="Llave.mp3"></audio>
  </div>

  <div class="item" onclick="reproducirAudio('canillaAudio')">
    <img src="img\Carilla 1\canilla con agua.PNG" alt="Canilla con agua">
  </div>


  <div class="item" onclick="reproducirAudio('canillaAudio')">
    <img src="img\Carilla 1\Leon.PNG" alt="Leon">
  </div>
  <div class="item" onclick="reproducirAudio('canillaAudio')">
    <img src="img\Carilla 1\lluvia.PNG" alt="lluvia">
  </div>
    <div class="item" onclick="reproducirAudio('canillaAudio')">
    <img src="img\Carilla 1\mono.PNG" alt="mono">
  </div>
      <div class="item" onclick="reproducirAudio('canillaAudio')">
    <img src="img\Carilla 1\pajaro.PNG" alt="pajaro">
  </div>
      <div class="item" onclick="reproducirAudio('canillaAudio')">
    <img src="img\Carilla 1\perro.PNG" alt="perro">
  </div>
      <div class="item" onclick="reproducirAudio('canillaAudio')">
    <img src="img\Carilla 1\sapo.PNG" alt="sapo">
  </div>
        <div class="item" onclick="reproducirAudio('canillaAudio')">
    <img src="img\Carilla 1\vaca.PNG" alt="vaca">
  </div>
</div>

<!-- Audios -->
<audio id="canillaAudio" src="canilla.mp3"></audio>
<audio id="elefanteAudio" src="elefante.mp3"></audio>
<audio id="gatoAudio" src="gato.mp3"></audio>
<audio id="grilloAudio" src="grillo.mp3"></audio>
<audio id="campanaAudio" src="campana.mp3"></audio>

<script>
  function reproducirAudio(id) {
    const audios = document.querySelectorAll("audio");

    audios.forEach(audio => {
      audio.pause();
      audio.currentTime = 0;
    });

    const audio = document.getElementById(id);
    audio.play();
  }
</script>

</body>
</html>
